name: Convert Document

# Triggered by the web frontend via the GitHub Actions API.
on:
  workflow_dispatch:
    inputs:
      google_doc_url:
        description: "Google Docs share URL"
        required: true
      mode:
        description: "Conversion mode: paper or blog"
        required: false
        default: "paper"
      title:
        description: "Title"
        required: true
      subtitle:
        description: "Subtitle (paper only)"
        required: false
        default: ""
      authors:
        description: "Authors (comma-separated)"
        required: false
        default: ""
      date:
        description: "Date (YYYY-MM-DD)"
        required: false
        default: ""
      tldr:
        description: "TL;DR summary (paper only)"
        required: false
        default: ""
      categories:
        description: "Categories (comma-separated)"
        required: false
        default: ""
      doctype:
        description: "Document type (paper only)"
        required: false
        default: ""
      docversion:
        description: "Version string (paper only)"
        required: false
        default: ""
      pdf_filename:
        description: "Output filename stem for paper mode (no spaces or extension)"
        required: false
        default: "document"
      slug:
        description: "URL slug for blog mode (no spaces or extension)"
        required: false
        default: ""
      render_pdf:
        description: "Render PDF with Typst (paper mode only)"
        type: boolean
        default: true
      run_token:
        description: "Unique token generated by the frontend for polling (do not edit)"
        required: true

permissions:
  contents: write

jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Fonts ────────────────────────────────────────────────────────────────
      - name: Install fonts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends fonts-texgyre fontconfig unzip wget
          wget -q "https://github.com/rsms/inter/releases/download/v4.0/Inter-4.0.zip"
          unzip -q Inter-4.0.zip -d /tmp/inter
          find /tmp/inter -name "*.ttf" -exec sudo cp {} /usr/local/share/fonts/ \;
          sudo fc-cache -f
          rm -rf Inter-4.0.zip /tmp/inter

      # ── Typst ────────────────────────────────────────────────────────────────
      - name: Install Typst
        run: |
          wget -q "https://github.com/typst/typst/releases/download/v0.13.1/typst-x86_64-unknown-linux-musl.tar.xz"
          tar -xf typst-x86_64-unknown-linux-musl.tar.xz
          sudo mv typst-x86_64-unknown-linux-musl/typst /usr/local/bin/typst
          rm -rf typst-x86_64-unknown-linux-musl.tar.xz typst-x86_64-unknown-linux-musl
          typst --version

      # ── Python ──────────────────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Conversion ──────────────────────────────────────────────────────────
      - name: Run conversion
        env:
          DOC_URL:      ${{ inputs.google_doc_url }}
          MODE:         ${{ inputs.mode }}
          TITLE:        ${{ inputs.title }}
          SUBTITLE:     ${{ inputs.subtitle }}
          AUTHORS:      ${{ inputs.authors }}
          DATE:         ${{ inputs.date }}
          TLDR:         ${{ inputs.tldr }}
          CATEGORIES:   ${{ inputs.categories }}
          DOCTYPE:      ${{ inputs.doctype }}
          DOCVERSION:   ${{ inputs.docversion }}
          PDF_FILENAME: ${{ inputs.pdf_filename }}
          SLUG:         ${{ inputs.slug }}
          RENDER_PDF:   ${{ inputs.render_pdf }}
        run: |
          RENDER_FLAG=""
          if [ "$RENDER_PDF" = "true" ] && [ "$MODE" != "blog" ]; then
            RENDER_FLAG="--render-pdf"
          fi
          python app/cli.py \
            --url          "$DOC_URL"      \
            --mode         "$MODE"         \
            --title        "$TITLE"        \
            --subtitle     "$SUBTITLE"     \
            --authors      "$AUTHORS"      \
            --date         "$DATE"         \
            --tldr         "$TLDR"         \
            --categories   "$CATEGORIES"   \
            --doctype      "$DOCTYPE"      \
            --docversion   "$DOCVERSION"   \
            --pdf-filename "$PDF_FILENAME" \
            --slug         "$SLUG"         \
            $RENDER_FLAG                   \
            --output /tmp/output.zip

      # ── Publish to gh-pages ─────────────────────────────────────────────────
      - name: Publish output to gh-pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          RUN_TOKEN=$(echo "${{ inputs.run_token }}" | tr -dc 'a-zA-Z0-9-')

          if git show-ref --verify --quiet refs/remotes/origin/gh-pages; then
            git worktree add /tmp/ghpages origin/gh-pages
          else
            git worktree add --orphan -b gh-pages /tmp/ghpages
            touch /tmp/ghpages/.nojekyll
            cd /tmp/ghpages
            git add .nojekyll
            git commit -m "chore: initialize gh-pages"
            git push origin gh-pages
            cd -
          fi

          mkdir -p /tmp/ghpages/outputs/${RUN_TOKEN}
          cp /tmp/output.zip /tmp/ghpages/outputs/${RUN_TOKEN}/document.zip

          cd /tmp/ghpages
          git add outputs/${RUN_TOKEN}/document.zip
          git commit -m "output: ${RUN_TOKEN}"

          # Retry push up to 3 times to handle concurrent-push conflicts
          for i in 1 2 3; do
            git pull --rebase origin gh-pages \
              && git push origin HEAD:gh-pages \
              && break \
              || sleep $((i * 5))
          done
